services:
  db:
    image: postgres:18-alpine
    container_name: performance_sql
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: performance_db
    ports:
      - "5442:5432"  # Puerto 5442 en host, 5432 en container
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql:/docker-entrypoint-initdb.d

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: performance_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@performance.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_ENABLE_SERVER_SIDE_SSL: "False"
      PGADMIN_SERVER_MODE: "True"
    ports:
      - "5055:80"  # Puerto 5055 en host, 80 en container (común para desarrollo)
    volumes:
      - pgadmin_data:/var/lib/pgadmin

volumes:
  postgres_data:
  pgadmin_data:
